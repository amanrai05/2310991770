<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Campus Notification Dashboard (Legacy)</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;--surface:#111118;--card:#161620;--border:#2a2a3a;
    --accent:#7c6fff;--accent2:#ff6b9d;--accent3:#4ecdc4;
    --text:#f0f0f8;--muted:#7878a0;--sub:#3a3a50;
    --event:#4ecdc4;--result:#ffd166;--placement:#ff6b9d;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1.5rem}
  .logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text);padding:0.5rem 0.75rem;border-radius:10px;background:linear-gradient(135deg,rgba(124,111,255,.15),rgba(255,107,157,.1));border:1px solid rgba(124,111,255,.3);letter-spacing:0.05em}
  .logo span{color:var(--accent)}
  .nav-section label{font-size:0.65rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;padding:0 0.75rem;display:block;margin-bottom:0.5rem}
  .nav-btn{width:100%;background:none;border:none;color:var(--muted);text-align:left;padding:0.6rem 0.75rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.87rem;cursor:pointer;display:flex;align-items:center;gap:0.6rem;transition:all 0.15s}
  .nav-btn:hover{background:var(--card);color:var(--text)}
  .nav-btn.active{background:rgba(124,111,255,.15);color:var(--accent);border:1px solid rgba(124,111,255,.25)}
  .nav-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot-all{background:var(--muted)}
  .dot-event{background:var(--event)}
  .dot-result{background:var(--result)}
  .dot-placement{background:var(--placement)}
  .count-badge{margin-left:auto;font-size:0.7rem;background:var(--sub);color:var(--muted);padding:2px 7px;border-radius:20px}
  .main{display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .page-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:600}
  .controls{display:flex;align-items:center;gap:0.75rem}
  .ctrl-group{display:flex;align-items:center;gap:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.75rem}
  .ctrl-group label{font-size:0.75rem;color:var(--muted);white-space:nowrap}
  .ctrl-group select, .ctrl-group input{background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;cursor:pointer;min-width:40px}
  .tab-bar{display:flex;gap:0.25rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:3px}
  .tab{background:none;border:none;color:var(--muted);padding:0.4rem 0.9rem;border-radius:6px;font-size:0.82rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s}
  .tab.active{background:var(--accent);color:#fff;font-weight:500}
  .content{flex:1;overflow-y:auto;padding:1.5rem 2rem;display:flex;flex-direction:column;gap:1rem}
  .section-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.25rem}
  .section-title{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
  .section-line{flex:1;height:1px;background:var(--border)}
  .notif-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;display:flex;gap:1rem;align-items:flex-start;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
  .notif-card:hover{border-color:rgba(124,111,255,.4);background:#1a1a26}
  .notif-card.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
  .unread-event::before{background:var(--event)}
  .unread-result::before{background:var(--result)}
  .unread-placement::before{background:var(--placement)}
  .notif-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
  .icon-event{background:rgba(78,205,196,.12);border:1px solid rgba(78,205,196,.25)}
  .icon-result{background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.25)}
  .icon-placement{background:rgba(255,107,157,.12);border:1px solid rgba(255,107,157,.25)}
  .notif-body{flex:1;min-width:0}
  .notif-top{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem}
  .type-pill{font-size:0.65rem;font-weight:500;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.07em;flex-shrink:0}
  .pill-event{background:rgba(78,205,196,.15);color:var(--event);border:1px solid rgba(78,205,196,.25)}
  .pill-result{background:rgba(255,209,102,.15);color:var(--result);border:1px solid rgba(255,209,102,.25)}
  .pill-placement{background:rgba(255,107,157,.15);color:var(--placement);border:1px solid rgba(255,107,157,.25)}
  .notif-msg{font-size:0.92rem;color:var(--text);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize}
  .notif-time{font-size:0.75rem;color:var(--muted);margin-top:0.2rem}
  .priority-star{flex-shrink:0;font-size:14px;opacity:0.6}
  .new-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;color:var(--muted);gap:0.75rem;text-align:center}
  .empty-icon{font-size:2.5rem;opacity:0.4}
  .loader{display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:2rem;color:var(--muted);font-size:0.9rem}
  .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:rgba(226,75,74,.08);border:1px solid rgba(226,75,74,.3);border-radius:10px;padding:1rem 1.25rem;color:#f09595;font-size:0.85rem;display:flex;gap:0.75rem;align-items:center}
  .pagination{display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:1rem 0 0.5rem}
  .pg-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
  .pg-btn:hover:not(:disabled){background:rgba(124,111,255,.15);color:var(--accent);border-color:rgba(124,111,255,.3)}
  .pg-btn:disabled{opacity:0.35;cursor:default}
  .pg-btn.current{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pg-info{font-size:0.8rem;color:var(--muted);padding:0 0.5rem}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:0.5rem}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem}
  .stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem}
  .stat-val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:600}
  .val-event{color:var(--event)}
  .val-result{color:var(--result)}
  .val-placement{color:var(--placement)}
  .refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:0.4rem 0.75rem;border-radius:8px;font-size:0.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:0.4rem}
  .refresh-btn:hover{color:var(--accent);border-color:rgba(124,111,255,.3)}
  @media(max-width:700px){.app{grid-template-columns:1fr}.sidebar{display:none}.topbar{padding:0.75rem 1rem}.content{padding:1rem}}
  </style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="logo">AFFORD<span>MED</span> <span style="font-weight:300;font-size:0.85rem;color:var(--muted)">notify</span></div>
    <div class="nav-section">
      <label>Inbox</label>
      <button class="nav-btn active" onclick="setView('all','all',event)">
        <span class="dot dot-all"></span>All Notifications
        <span class="count-badge" id="cnt-all">-</span>
      </button>
      <button class="nav-btn" onclick="setView('priority','all',event)">
        ⭐ Priority Inbox
        <span class="count-badge" id="cnt-priority">-</span>
      </button>
    </div>
    <div class="nav-section">
      <label>By Type</label>
      <button class="nav-btn" onclick="setView('all','Event',event)">
        <span class="dot dot-event"></span>Events
        <span class="count-badge" id="cnt-event">-</span>
      </button>
      <button class="nav-btn" onclick="setView('all','Result',event)">
        <span class="dot dot-result"></span>Results
        <span class="count-badge" id="cnt-result">-</span>
      </button>
      <button class="nav-btn" onclick="setView('all','Placement',event)">
        <span class="dot dot-placement"></span>Placements
        <span class="count-badge" id="cnt-placement">-</span>
      </button>
    </div>
    <div style="margin-top:auto;font-size:0.72rem;color:var(--muted);padding:0.5rem 0.75rem;line-height:1.5">
      <div style="margin-bottom:4px;font-weight:500">Priority Formula</div>
      <div>🏆 Placement &gt; 📊 Result &gt; 📅 Event</div>
      <div style="margin-top:4px">+ Recency tiebreaker</div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div id="page-title" class="page-title">All Notifications</div>
      <div class="controls">
        <div class="ctrl-group">
          <label>Limit</label>
          <select id="limit-sel" onchange="onLimitChange()">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="15">15</option>
            <option value="20">20</option>
          </select>
        </div>
        <button class="refresh-btn" onclick="fetchData()">↻ Refresh</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="loader"><div class="spinner"></div>Loading notifications...</div>
    </div>
  </main>
</div>

<script>
// API can be overridden with query param ?api=...
const API = (new URLSearchParams(location.search).get('api')) || 'http://localhost:4000/notifications';
const WEIGHT = {Placement:3,Result:2,Event:1};
const ICON = {Event:'📅',Result:'📊',Placement:'🏆'};

let allNotifs = [];
let viewMode = 'all';
let typeFilter = 'all';
let limit = 10;
let page = 1;
let seenIds = new Set();
let totalFetched = 0;

function priorityScore(n){
  const w = WEIGHT[n.Type]||0;
  const t = new Date(n.Timestamp||n.timestamp||0).getTime();
  return w*1e13 + t;
}

function setView(mode,type,e){
  viewMode=mode; typeFilter=type; page=1;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(e && e.currentTarget) e.currentTarget.classList.add('active');
  const titles={all:{all:'All Notifications',Event:'Events',Result:'Results',Placement:'Placements'},priority:{all:'⭐ Priority Inbox'}};
  document.getElementById('page-title').textContent=(titles[mode]&&titles[mode][type])||'Notifications';
  render();
}

function onLimitChange(){
  limit=parseInt(document.getElementById('limit-sel').value);
  page=1;
  render();
}

async function fetchData(){
  const content=document.getElementById('content');
  content.innerHTML='<div class="loader"><div class="spinner"></div>Fetching notifications...</div>';
  try{
    const params=new URLSearchParams({limit:50});
    const res=await fetch(`${API}?${params}`,{headers:{'Content-Type':'application/json'}});
    if(!res.ok)throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const data=await res.json();
    allNotifs=(data.notifications||data||[]).map(n=>({...n,Type:n.Type||n.type,Message:n.Message||n.message,Timestamp:n.Timestamp||n.timestamp,ID:n.ID||n.id}));
    totalFetched=allNotifs.length;
    updateCounts();
    render();
  }catch(e){
    content.innerHTML=`<div class="error-box">⚠ ${e.message||'Could not reach API'}. Showing mock data.</div>`;
    loadMock();
  }
}

function loadMock(){
  const types=['Placement','Result','Event'];
  const msgs={Event:['tech-fest','farewell','orientation','workshop','seminar'],Result:['mid-sem','project-review','external','viva'],Placement:['Advanced Micro Devices Inc. hiring','CSX Corporation hiring','Google hiring','Microsoft hiring']};
  allNotifs=[];
  for(let i=0;i<30;i++){
    const t=types[i%3];
    const dt=new Date(Date.now()-(i*200000+Math.random()*100000));
    allNotifs.push({ID:`mock-${i}`,Type:t,Message:msgs[t][i%msgs[t].length],Timestamp:dt.toISOString()});
  }
  totalFetched=allNotifs.length;
  updateCounts();
  render();
}

function updateCounts(){
  const c={Event:0,Result:0,Placement:0};
  allNotifs.forEach(n=>c[n.Type]=(c[n.Type]||0)+1);
  document.getElementById('cnt-all').textContent=allNotifs.length;
  document.getElementById('cnt-event').textContent=c.Event;
  document.getElementById('cnt-result').textContent=c.Result;
  document.getElementById('cnt-placement').textContent=c.Placement;
  let prioritized=getPrioritized(allNotifs);
  document.getElementById('cnt-priority').textContent=Math.min(limit,prioritized.length);
}

function getPrioritized(list){
  return [...list].sort((a,b)=>priorityScore(b)-priorityScore(a));
}

function getFiltered(){
  let list=allNotifs;
  if(typeFilter!=='all')list=list.filter(n=>n.Type===typeFilter);
  if(viewMode==='priority')list=getPrioritized(list).slice(0,limit);
  else list=[...list].sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp));
  return list;
}

function formatTime(ts){
  if(!ts)return'';
  const d=new Date(ts);
  const now=new Date();
  const diff=now-d;
  if(diff<60000)return'just now';
  if(diff<3600000)return`${Math.floor(diff/60000)}m ago`;
  if(diff<86400000)return`${Math.floor(diff/3600000)}h ago`;
  return d.toLocaleDateString();
}

function isNew(n){
  const ts=new Date(n.Timestamp);
  return (Date.now()-ts)<3600000*2;
}

function render(){
  const content=document.getElementById('content');
  const filtered=getFiltered();
  const isPriority=viewMode==='priority';

  let pageData=filtered;
  let totalPages=1;
  if(!isPriority){
    totalPages=Math.max(1,Math.ceil(filtered.length/limit));
    page=Math.min(page,totalPages);
    pageData=filtered.slice((page-1)*limit,page*limit);
  }

  if(filtered.length===0){
    content.innerHTML='<div class="empty"><div class="empty-icon">🔔</div><div>No notifications found</div></div>';
    return;
  }

  let html='';

  if(!isPriority){
    const c={Event:0,Result:0,Placement:0};
    filtered.forEach(n=>c[n.Type]=(c[n.Type]||0)+1);
    html+=`<div class="stats-row">
      <div class="stat-card"><div class="stat-label">Events</div><div class="stat-val val-event">${c.Event}</div></div>
      <div class="stat-card"><div class="stat-label">Results</div><div class="stat-val val-result">${c.Result}</div></div>
      <div class="stat-card"><div class="stat-label">Placements</div><div class="stat-val val-placement">${c.Placement}</div></div>
    </div>`;
  }

  if(isPriority){
    html+=`<div class="section-header"><span class="section-title">Top ${Math.min(limit,filtered.length)} Priority</span><span class="section-line"></span></div>`;
    pageData.forEach((n,i)=>{
      html+=renderCard(n,i);
    });
  } else {
    html+=`<div class="section-header"><span class="section-title">Page ${page} of ${totalPages} · ${filtered.length} total</span><span class="section-line"></span></div>`;
    pageData.forEach((n,i)=>{
      html+=renderCard(n,i);
    });
    if(totalPages>1){
      html+='<div class="pagination">';
      html+=`<button class="pg-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
      for(let p2=Math.max(1,page-2);p2<=Math.min(totalPages,page+2);p2++){
        html+=`<button class="pg-btn ${p2===page?'current':''}" onclick="goPage(${p2})">${p2}</button>`;
      }
      html+=`<button class="pg-btn" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>›</button>`;
      html+='</div>';
    }
  }

  content.innerHTML=html;
  pageData.forEach(n=>seenIds.add(n.ID));
}

function renderCard(n,i){
  const t=n.Type||'Event';
  const fresh=isNew(n)&&!seenIds.has(n.ID);
  const isPri=viewMode==='priority';
  const w=WEIGHT[t]||0;
  const isUnread=!seenIds.has(n.ID);
  let classes=`notif-card`;
  if(isUnread)classes+=` unread unread-${t.toLowerCase()}`;
  return `<div class="${classes}" style="animation:fadeIn 0.2s ease ${i*0.04}s both">
    <div class="notif-icon icon-${t.toLowerCase()}">${ICON[t]}</div>
    <div class="notif-body">
      <div class="notif-top">
        <span class="type-pill pill-${t.toLowerCase()}">${t}</span>
        ${isPri?`<span style="font-size:0.7rem;color:var(--muted)">Score: ${['','★','★★','★★★'][w]}</span>`:''}
        ${isUnread?'<span class="new-dot"></span>':''}
        <span style="margin-left:auto;font-size:0.75rem;color:var(--muted)">${formatTime(n.Timestamp)}</span>
      </div>
      <div class="notif-msg">${n.Message||'No message'}</div>
      <div class="notif-time">${n.Timestamp?new Date(n.Timestamp).toLocaleString():''}</div>
    </div>
    ${isPri?`<span class="priority-star">${['','★','★★','★★★'][w]}</span>`:''}
  </div>`;
}

function goPage(p){page=p;render();document.getElementById('content').scrollTop=0;}

const style2=document.createElement('style');
style2.textContent='@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}';
document.head.appendChild(style2);

fetchData();
setInterval(fetchData,30000);
</script>
</body>
</html>
